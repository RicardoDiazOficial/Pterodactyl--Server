name: INFINIX NETWORK - PTERODACTYL PRO

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  vps-ptero:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Recuperar Caché Pterodactyl (SRV)"
        id: cache-srv
        uses: actions/cache/restore@v4
        with:
          path: SRV
          key: srv-ptero-${{ github.run_id }}
          restore-keys: |
            srv-ptero-

      - name: "3. Crear Arquitectura y Archivo Docker Compose"
        run: |
          # Creamos las carpetas donde se guardará todo el panel y los servers
          mkdir -p SRV/mysql SRV/panel-var SRV/panel-logs SRV/wings-etc SRV/wings-data
          chmod -R 777 SRV
          
          # Escribimos el archivo docker-compose.yml 
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          services:
            database:
              image: mariadb:10.5
              restart: always
              command: --default-authentication-plugin=mysql_native_password
              environment:
                MYSQL_DATABASE: panel
                MYSQL_USER: pterodactyl
                MYSQL_PASSWORD: ptero_password
                MYSQL_ROOT_PASSWORD: root_password
              volumes:
                - ./SRV/mysql:/var/lib/mysql
            cache:
              image: redis:alpine
              restart: always
            panel:
              image: ghcr.io/pterodactyl/panel:latest
              restart: always
              ports:
                - "80:80"
              environment:
                APP_URL: "http://localhost"
                APP_TIMEZONE: "America/Caracas"
                APP_ENV: "production"
                # Llave estática para que no se rompan las contraseñas al reiniciar
                APP_KEY: "base64:SW5maW5peE5ldHdvcmtQdGVyb1NlY3JldEtleTEyMzQh="
                DB_HOST: database
                DB_PORT: 3306
                DB_DATABASE: panel
                DB_USERNAME: pterodactyl
                DB_PASSWORD: ptero_password
                CACHE_DRIVER: redis
                SESSION_DRIVER: redis
                QUEUE_CONNECTION: redis
                REDIS_HOST: cache
              volumes:
                - ./SRV/panel-var:/app/var/
                - ./SRV/panel-logs:/app/storage/logs/
            wings:
              image: ghcr.io/pterodactyl/wings:latest
              restart: always
              network_mode: "host"
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /var/lib/docker/containers:/var/lib/docker/containers
                - ./SRV/wings-etc:/etc/pterodactyl
                - ./SRV/wings-data:/var/lib/pterodactyl
          EOF

      - name: "4. Arrancar Pterodactyl y Configurar (Rápido)"
        run: |
          echo "🚀 Descargando e iniciando contenedores..."
          # AQUI EL FIX: 'docker compose' (con espacio, sin guion)
          docker compose up -d database cache panel
          
          echo "⏳ Esperando 20s para que MariaDB inicialice..."
          sleep 20
          
          # AQUI EL FIX DEL ESPACIO: if[ ! -d ... ]
          if [ ! -d "SRV/mysql/panel" ]; then
            echo "🆕 Primera vez: Configurando Base de Datos..."
            docker compose exec -T panel php artisan migrate --seed --force || true
            echo "🆕 Creando Administrador Principal..."
            docker compose exec -T panel php artisan p:user:make --email="admin@infinix.com" --username="admin" --name-first="Admin" --name-last="Infinix" --password="adminpassword" --admin=1 || true
          else
            echo "♻️ Datos detectados. El Panel ya está configurado y listo."
          fi
          
          # Iniciamos Wings (El Demonio de Pterodactyl)
          docker compose up -d wings
          echo "✅ Pterodactyl Online. (Si el server estaba ON, Wings lo prenderá ahora mismo)"

      - name: "5. Iniciar Red Pública (Playit - JUGADORES PRIMERO)"
        run: |
          docker run -d \
            --name=playit \
            --net=host \
            -e SECRET_KEY=6d0615844adfcc7f2bd89a75d44504c48aaab7c23c0ca4aa1ead3e3ac665a8b7 \
            ghcr.io/playit-cloud/playit-agent:0.17
          echo "✅ Playit conectado. LOS JUGADORES YA PUEDEN ENTRAR."

      - name: "6. Instalar Red Privada (Tailscale + SSH - SEGUNDO PLANO)"
        run: |
          echo "⏳ Configurando acceso administrativo mientras el servidor arranca..."
          echo "runner:runnerpass" | sudo chpasswd
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-kCxCNvJST811CNTRL-XTonMx8eTw3YNvyQgS7Vw3vJvFpcVmSG --hostname=Infinix-Ptero --ssh
          
          echo "---------------------------------------------------------"
          echo "👑 PANEL PTERODACTYL ESTÁ LISTO"
          echo "🌐 Web : http://$(tailscale ip -4)"
          echo "💻 SSH : ssh runner@$(tailscale ip -4)"
          echo "Usuario: admin@infinix.com | Clave: adminpassword"
          echo "---------------------------------------------------------"

      - name: "7. Ciclo de Vida"
        run: |
          echo "Servidor protegido. Monitoreando por 5h 45m..."
          sleep 20700 

      - name: "8. Apagado y Guardado Seguro"
        if: always()
        run: |
          echo "🛑 Deteniendo Pterodactyl de forma segura..."
          # Apagamos docker compose (Cierra BD, Panel y Wings limpiamente)
          docker compose down || true
          docker stop playit || true
          sleep 10

      - name: "9. Save Cache"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SRV
          key: srv-ptero-${{ github.run_id }}

      - name: "10. Relevo Automático"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⏰ Lanzando relevo..."
          # CAMBIA 'main.yml' POR EL NOMBRE DE TU ARCHIVO SI ES DISTINTO
          gh workflow run "main.yml" --ref main
          sleep 600
