name: INFINIX NETWORK - JEXACTYL ULTIMATE

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  vps-jexactyl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Recuperar Caché (SRV)"
        id: cache-srv
        uses: actions/cache/restore@v4
        with:
          path: SRV
          key: srv-jexactyl-${{ github.run_id }}
          restore-keys: |
            srv-jexactyl-

      - name: "3. Red Privada (Tailscale + SSH)"
        run: |
          echo "⏳ Configurando seguridad..."
          echo "runner:runnerpass" | sudo chpasswd
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo systemctl restart ssh || true
          
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-kCxCNvJST811CNTRL-XTonMx8eTw3YNvyQgS7Vw3vJvFpcVmSG --hostname=Infinix-Jexactyl --ssh
          tailscale ip -4 > ts_ip.txt
          echo "✅ IP Tailscale: $(cat ts_ip.txt)"

      - name: "4. Generar Docker Compose (Jexactyl)"
        run: |
          TS_IP=$(cat ts_ip.txt)
          mkdir -p SRV/mysql SRV/panel-var SRV/panel-logs SRV/wings-etc SRV/wings-data
          sudo chmod -R 777 SRV
          
          # Jexactyl usa la misma base que Ptero, pero con su propia imagen
          cat << EOF > docker-compose.yml
          version: '3.8'
          services:
            database:
              image: mariadb:10.5
              restart: always
              command: --default-authentication-plugin=mysql_native_password
              environment:
                MYSQL_DATABASE: panel
                MYSQL_USER: jexactyl
                MYSQL_PASSWORD: jexactyl_pass
                MYSQL_ROOT_PASSWORD: root_password
              volumes:
                - ./SRV/mysql:/var/lib/mysql
            cache:
              image: redis:alpine
              restart: always
            panel:
              image: ghcr.io/jexactyl/jexactyl:latest
              container_name: panel
              restart: always
              ports:
                - "8080:80"
              environment:
                APP_URL: "http://$TS_IP:8080"
                APP_TIMEZONE: "America/Caracas"
                APP_ENV: "production"
                APP_KEY: "base64:w/M2+2DqQy4GZ01fR5FwD+xKqU/0Qj9nZ9mYq+X7B+A="
                DB_HOST: database
                DB_PORT: 3306
                DB_DATABASE: panel
                DB_USERNAME: jexactyl
                DB_PASSWORD: jexactyl_pass
                CACHE_DRIVER: redis
                SESSION_DRIVER: redis
                QUEUE_CONNECTION: redis
                REDIS_HOST: cache
              volumes:
                - ./SRV/panel-var:/app/var/
                - ./SRV/panel-logs:/app/storage/logs/
            wings:
              image: ghcr.io/pterodactyl/wings:latest
              container_name: wings
              restart: always
              network_mode: "host"
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /var/lib/docker/containers:/var/lib/docker/containers
                - ./SRV/wings-etc:/etc/pterodactyl
                - ./SRV/wings-data:/var/lib/pterodactyl
          EOF

      - name: "5. Arrancar Jexactyl (Instalación Automática)"
        run: |
          echo "🚀 Iniciando contenedores..."
          docker compose up -d database cache panel
          
          echo "⏳ Esperando BD (Hasta 40s)..."
          for i in {1..20}; do
            if docker compose exec -T database mysqladmin ping -h localhost -uroot -proot_password --silent; then break; fi
            sleep 2
          done
          
          # Fix de permisos
          docker compose exec -T panel chown -R 33:33 /app/var /app/storage || true
          
          # INSTALACIÓN INTELIGENTE
          if [ ! -d "SRV/mysql/panel" ]; then
            echo "🆕 Primera vez: Instalando Jexactyl..."
            
            # VACUNA SSL MYSQL (El Fix que funcionó)
            docker compose exec -T panel apk add --no-cache mysql-client mariadb-client || true
            docker compose exec -T panel sh -c 'echo "#!/bin/sh" > /usr/local/bin/mysql'
            docker compose exec -T panel sh -c 'echo "mariadb --skip-ssl \"\$@\"" >> /usr/local/bin/mysql'
            docker compose exec -T panel chmod +x /usr/local/bin/mysql
            
            # Ejecutar migraciones e instalación
            docker compose exec -T panel php artisan migrate:fresh --seed --force || true
            docker compose exec -T panel php artisan p:user:make --email="admin@infinix.com" --username="admin" --name-first="Admin" --name-last="Infinix" --password="adminpassword" --admin=1 || true
          else
            echo "♻️ Jexactyl ya instalado. Limpiando caché..."
            docker compose exec -T panel php artisan optimize:clear || true
          fi
          
          # VACUNA ANTI-POOL OVERLAPS (Red Wings)
          # Inyectamos la config de red SIEMPRE antes de prender Wings
          mkdir -p SRV/wings-etc
          if ! grep -q "pterodactyl_nw" "SRV/wings-etc/config.yml" 2>/dev/null; then
             echo "🔧 Aplicando parche de red a Wings..."
             cat <<EOT >> SRV/wings-etc/config.yml
          
          docker:
            network:
              interface: pterodactyl0
              driver: bridge
              network_mode: pterodactyl_nw
              subnet: "192.168.200.0/24"
              gateway: "192.168.200.1"
              is_internal: false
              enable_icc: true
          EOT
          fi
          
          docker compose up -d wings
          echo "✅ Wings iniciado."

      - name: "6. Conectar Playit"
        run: |
          docker run -d \
            --name=playit \
            --net=host \
            -e SECRET_KEY=6d0615844adfcc7f2bd89a75d44504c48aaab7c23c0ca4aa1ead3e3ac665a8b7 \
            ghcr.io/playit-cloud/playit-agent:0.17
          echo "✅ Playit Online."

      - name: "7. Datos de Acceso"
        run: |
          TS_IP=$(cat ts_ip.txt)
          echo "---------------------------------------------------------"
          echo "👑 JEXACTYL ESTÁ ONLINE"
          echo "URL: http://$TS_IP:8080"
          echo "User: admin@infinix.com | Pass: adminpassword"
          echo "---------------------------------------------------------"
          sleep 20700 

      - name: "8. Guardado Seguro"
        if: always()
        run: |
          echo "🛑 Guardando Jexactyl..."
          docker compose down || true
          docker stop playit || true
          sleep 5

      - name: "9. Save Cache"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SRV
          key: srv-jexactyl-${{ github.run_id }}

      - name: "10. Relevo"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "main.yml" --ref main
          sleep 600
