name: INFINIX NETWORK - PTERODACTYL PRO

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  vps-ptero:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Recuperar Caché Pterodactyl (SRV)"
        id: cache-srv
        uses: actions/cache/restore@v4
        with:
          path: SRV
          key: srv-ptero-${{ github.run_id }}
          restore-keys: |
            srv-ptero-

      - name: "3. Conectar Red Privada (Tailscale PRIMERO)"
        run: |
          echo "runner:runnerpass" | sudo chpasswd
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-kCxCNvJST811CNTRL-XTonMx8eTw3YNvyQgS7Vw3vJvFpcVmSG --hostname=Infinix-Ptero --ssh
          
          # Guardamos la IP en un archivo para usarla en el siguiente paso
          tailscale ip -4 > ts_ip.txt
          echo "IP asignada: $(cat ts_ip.txt)"

      - name: "4. Crear Arquitectura Docker Compose"
        run: |
          # Leemos la IP de Tailscale
          TS_IP=$(cat ts_ip.txt)
          
          mkdir -p SRV/mysql SRV/panel-var SRV/panel-logs SRV/wings-etc SRV/wings-data
          chmod -R 777 SRV
          
          # Creamos el archivo de configuración. (Al no poner comillas en EOF, inyecta la IP real)
          cat << EOF > docker-compose.yml
          version: '3.8'
          services:
            database:
              image: mariadb:10.5
              restart: always
              command: --default-authentication-plugin=mysql_native_password
              environment:
                MYSQL_DATABASE: panel
                MYSQL_USER: pterodactyl
                MYSQL_PASSWORD: ptero_password
                MYSQL_ROOT_PASSWORD: root_password
              volumes:
                - ./SRV/mysql:/var/lib/mysql
            cache:
              image: redis:alpine
              restart: always
            panel:
              image: ghcr.io/pterodactyl/panel:latest
              restart: always
              ports:
                - "8080:80"
              environment:
                APP_URL: "http://$TS_IP:8080"
                APP_TIMEZONE: "America/Caracas"
                APP_ENV: "production"
                APP_KEY: "base64:w/M2+2DqQy4GZ01fR5FwD+xKqU/0Qj9nZ9mYq+X7B+A="
                DB_HOST: database
                DB_PORT: 3306
                DB_DATABASE: panel
                DB_USERNAME: pterodactyl
                DB_PASSWORD: ptero_password
                CACHE_DRIVER: redis
                SESSION_DRIVER: redis
                QUEUE_CONNECTION: redis
                REDIS_HOST: cache
              volumes:
                - ./SRV/panel-var:/app/var/
                - ./SRV/panel-logs:/app/storage/logs/
            wings:
              image: ghcr.io/pterodactyl/wings:latest
              restart: always
              network_mode: "host"
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /var/lib/docker/containers:/var/lib/docker/containers
                - ./SRV/wings-etc:/etc/pterodactyl
                - ./SRV/wings-data:/var/lib/pterodactyl
          EOF

      - name: "5. Arrancar Pterodactyl y Base de Datos"
        run: |
          echo "🚀 Levantando Panel y BD..."
          docker compose up -d database cache panel
          
          echo "⏳ Esperando 25s para que la Base de Datos esté lista..."
          sleep 25
          
          if [ ! -d "SRV/mysql/panel" ]; then
            echo "🆕 Primera vez: Configurando Base de Datos..."
            docker compose exec -T panel php artisan migrate --seed --force || true
            echo "🆕 Creando Administrador Principal..."
            docker compose exec -T panel php artisan p:user:make --email="admin@infinix.com" --username="admin" --name-first="Admin" --name-last="Infinix" --password="adminpassword" --admin=1 || true
          else
            echo "♻️ Datos detectados. El Panel está cargado."
          fi
          
          docker compose up -d wings
          echo "✅ Pterodactyl Online en el puerto 8080."

      - name: "6. Iniciar Red Pública (Playit)"
        run: |
          docker run -d \
            --name=playit \
            --net=host \
            -e SECRET_KEY=6d0615844adfcc7f2bd89a75d44504c48aaab7c23c0ca4aa1ead3e3ac665a8b7 \
            ghcr.io/playit-cloud/playit-agent:0.17
          echo "✅ Playit conectado."

      - name: "7. Información y Ciclo de Vida"
        run: |
          TS_IP=$(cat ts_ip.txt)
          echo "---------------------------------------------------------"
          echo "👑 PTERODACTYL ESTÁ LISTO"
          echo "URL Web: http://$TS_IP:8080"
          echo "Usuario: admin@infinix.com"
          echo "Clave  : adminpassword"
          echo "---------------------------------------------------------"
          sleep 20700 

      - name: "8. Apagado y Guardado Seguro"
        if: always()
        run: |
          echo "🛑 Guardando estado de Pterodactyl..."
          docker compose down || true
          docker stop playit || true
          sleep 10

      - name: "9. Save Cache"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SRV
          key: srv-ptero-${{ github.run_id }}

      - name: "10. Relevo Automático"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "main.yml" --ref main
          sleep 600
