name: PTERODACTYL PANEL

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  vps-ptero:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Entorno"
        uses: actions/checkout@v4

      - name: "2. Recuperar Caché Pterodactyl (SRV)"
        id: cache-srv
        uses: actions/cache/restore@v4
        with:
          path: SRV
          key: srv-ptero-${{ github.run_id }}
          restore-keys: |
            srv-ptero-

      - name: "3. Conectar Red Privada y Configurar SSH REAL"
        run: |
          echo "⏳ Configurando SSH y Tailscale..."
          
          # 1. Asignar contraseña
          echo "runner:runnerpass" | sudo chpasswd
          
          # 2. FORZAR a Ubuntu a aceptar contraseñas por SSH
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo systemctl restart ssh || true
          
          # 3. Instalar Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-kCxCNvJST811CNTRL-XTonMx8eTw3YNvyQgS7Vw3vJvFpcVmSG --hostname=Infinix-Ptero --ssh
          
          tailscale ip -4 > ts_ip.txt
          echo "✅ IP Privada lista: $(cat ts_ip.txt)"

      - name: "4. Crear Arquitectura Docker Compose"
        run: |
          TS_IP=$(cat ts_ip.txt)
          mkdir -p SRV/mysql SRV/panel-var SRV/panel-logs SRV/wings-etc SRV/wings-data
          
          # Damos permisos totales desde afuera
          sudo chmod -R 777 SRV
          
          cat << EOF > docker-compose.yml
          version: '3.8'
          services:
            database:
              image: mariadb:10.5
              restart: always
              command: --default-authentication-plugin=mysql_native_password
              environment:
                MYSQL_DATABASE: panel
                MYSQL_USER: pterodactyl
                MYSQL_PASSWORD: ptero_password
                MYSQL_ROOT_PASSWORD: root_password
              volumes:
                - ./SRV/mysql:/var/lib/mysql
            cache:
              image: redis:alpine
              restart: always
            panel:
              image: ghcr.io/pterodactyl/panel:latest
              restart: always
              ports:
                - "8080:80"
              environment:
                APP_URL: "http://$TS_IP:8080"
                APP_TIMEZONE: "America/Caracas"
                APP_ENV: "production"
                APP_KEY: "base64:w/M2+2DqQy4GZ01fR5FwD+xKqU/0Qj9nZ9mYq+X7B+A="
                DB_HOST: database
                DB_PORT: 3306
                DB_DATABASE: panel
                DB_USERNAME: pterodactyl
                DB_PASSWORD: ptero_password
                CACHE_DRIVER: redis
                SESSION_DRIVER: redis
                QUEUE_CONNECTION: redis
                REDIS_HOST: cache
              volumes:
                - ./SRV/panel-var:/app/var/
                - ./SRV/panel-logs:/app/storage/logs/
            wings:
              image: ghcr.io/pterodactyl/wings:latest
              restart: always
              network_mode: "host"
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /var/lib/docker/containers:/var/lib/docker/containers
                - ./SRV/wings-etc:/etc/pterodactyl
                - ./SRV/wings-data:/var/lib/pterodactyl
          EOF

      - name: "5. Arrancar Pterodactyl (Evitando Error 500)"
        run: |
          echo "🚀 Levantando Panel y Base de Datos..."
          docker compose up -d database cache panel
          
          echo "⏳ Esperando a que MariaDB esté 100% lista..."
          # Bucle que verifica si la base de datos ya prendió (Evita que el script avance a ciegas)
          for i in {1..30}; do
            if docker compose exec -T database mysqladmin ping -h localhost -uroot -proot_password --silent; then
              echo "✅ Base de datos lista!"
              break
            fi
            sleep 2
          done
          
          # FIX ERROR 500: Arreglamos los permisos internos de Laravel a 'www-data' (usuario 33)
          docker compose exec -T panel chown -R 33:33 /app/var /app/storage || true
          
          # Comprobamos si la base de datos del panel ya tiene tablas
          if [ ! -d "SRV/mysql/panel" ] ||[ -z "$(ls -A SRV/mysql/panel 2>/dev/null)" ]; then
            echo "🆕 Primera vez: Configurando e Instalando Base de Datos..."
            docker compose exec -T panel php artisan migrate --seed --force || true
            docker compose exec -T panel php artisan p:user:make --email="admin@infinix.com" --username="admin" --name-first="Admin" --name-last="Infinix" --password="adminpassword" --admin=1 || true
          else
            echo "♻️ Datos detectados. Limpiando caché de web..."
            # Limpiamos el caché web para que Laravel no explote al cambiar de servidor
            docker compose exec -T panel php artisan optimize:clear || true
          fi
          
          # Prendemos el nodo
          docker compose up -d wings
          echo "✅ Pterodactyl Online sin Error 500."

      - name: "6. Iniciar Red Pública (Playit)"
        run: |
          docker run -d \
            --name=playit \
            --net=host \
            -e SECRET_KEY=6d0615844adfcc7f2bd89a75d44504c48aaab7c23c0ca4aa1ead3e3ac665a8b7 \
            ghcr.io/playit-cloud/playit-agent:0.17
          echo "✅ Playit conectado."

      - name: "7. Resumen de Control y Ciclo de Vida"
        run: |
          TS_IP=$(cat ts_ip.txt)
          echo "---------------------------------------------------------"
          echo "👑 INFINIX NETWORK - PTERODACTYL ESTÁ LISTO"
          echo "🌐 URL Web  : http://$TS_IP:8080"
          echo "💻 SSH      : ssh runner@$TS_IP"
          echo "🔐 Clave SSH: runnerpass"
          echo "👤 Web User : admin@infinix.com"
          echo "🔑 Web Pass : adminpassword"
          echo "---------------------------------------------------------"
          sleep 20700 

      - name: "8. Apagado y Guardado Seguro"
        if: always()
        run: |
          echo "🛑 Deteniendo Pterodactyl suavemente..."
          docker compose down || true
          docker stop playit || true
          sleep 10

      - name: "9. Save Cache"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SRV
          key: srv-ptero-${{ github.run_id }}

      - name: "10. Relevo Automático"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # CAMBIA 'main.yml' POR TU ARCHIVO
          gh workflow run "main.yml" --ref main
          sleep 600
